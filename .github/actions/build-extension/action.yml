name: Build extension
description: Validate, test, and pack the WildGuns helper extension into a zip.

inputs:
  zip-suffix:
    description: Optional suffix appended to the zip filename before .zip (e.g. "INTERNAL-pr-42-abcdef").
    required: false
    default: ""
  astra-write-token:
    description: |
      DataStax Astra application token, scoped to write-only access on the
      target collection. Pass `${{ secrets.ASTRA_WRITE_TOKEN }}` from every
      workflow that calls this action (release.yml, dev-build.yml, validate.yml).
      If the calling workflow runs without access to the secret (e.g. PRs from
      a fork), the build writes a stub config and Save Report surfaces
      ASTRA_NOT_CONFIGURED at runtime.
    required: false
    default: ""
  astra-db-id:
    description: Astra DB UUID. Supply via `${{ vars.ASTRA_DB_ID }}`.
    required: false
    default: ""
  astra-region:
    description: Astra DB region (e.g. "us-east1"). Supply via `${{ vars.ASTRA_REGION }}`.
    required: false
    default: ""
  astra-keyspace:
    description: Astra keyspace name. Supply via `${{ vars.ASTRA_KEYSPACE }}`.
    required: false
    default: ""
  astra-collection:
    description: Astra collection name. Supply via `${{ vars.ASTRA_COLLECTION }}`.
    required: false
    default: ""

outputs:
  version:
    description: Extension version read from manifest.json.
    value: ${{ steps.version.outputs.version }}
  name:
    description: Extension name slug read from manifest.json.
    value: ${{ steps.version.outputs.name }}
  zip-name:
    description: Filename of the produced zip.
    value: ${{ steps.pack.outputs.zip-name }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Run tests
      shell: bash
      run: npm test

    - name: Generate Astra config (lib/astra-config.js)
      shell: bash
      env:
        ASTRA_TOKEN:      ${{ inputs.astra-write-token }}
        ASTRA_DB_ID:      ${{ inputs.astra-db-id }}
        ASTRA_REGION:     ${{ inputs.astra-region }}
        ASTRA_KEYSPACE:   ${{ inputs.astra-keyspace }}
        ASTRA_COLLECTION: ${{ inputs.astra-collection }}
      run: |
        node - << 'NODE_EOF'
        const fs = require("fs");
        const token = process.env.ASTRA_TOKEN || "";
        const out = "lib/astra-config.js";
        if (!token) {
          fs.writeFileSync(out,
            "// Stub config generated at build time. No ASTRA_WRITE_TOKEN was\n" +
            "// supplied (PR / dev / validate build). The Save Report button will\n" +
            "// surface ASTRA_NOT_CONFIGURED at runtime, which is intentional.\n" +
            "self.ASTRA_CONFIG = null;\n");
          console.log("Wrote stub config (no token supplied).");
          process.exit(0);
        }
        for (const k of ["ASTRA_DB_ID", "ASTRA_REGION", "ASTRA_KEYSPACE", "ASTRA_COLLECTION"]) {
          if (!process.env[k]) {
            console.error(`ERROR: ${k} input is empty but ASTRA_TOKEN is set. Either supply all five Astra inputs or none.`);
            process.exit(1);
          }
        }
        const cfg = {
          dbId:       process.env.ASTRA_DB_ID,
          region:     process.env.ASTRA_REGION,
          keyspace:   process.env.ASTRA_KEYSPACE,
          collection: process.env.ASTRA_COLLECTION,
          token,
        };
        fs.writeFileSync(out,
          "// Generated at build time from GitHub Secrets / repo variables.\n" +
          "// Do not edit manually; do not commit (gitignored).\n" +
          "self.ASTRA_CONFIG = " + JSON.stringify(cfg, null, 2) + ";\n");
        console.log("Wrote real Astra config (token redacted from logs).");
        NODE_EOF
        node --check lib/astra-config.js

    - name: Install web-ext
      shell: bash
      run: npm install -g web-ext

    - name: Validate manifest.json
      shell: bash
      run: |
        node - << 'EOF'
        const fs   = require("fs");

        const raw = fs.readFileSync("manifest.json", "utf8");

        let manifest;
        try {
          manifest = JSON.parse(raw);
        } catch (e) {
          console.error("manifest.json is not valid JSON:", e.message);
          process.exit(1);
        }

        const errors = [];

        const required = ["manifest_version", "name", "version"];
        for (const field of required) {
          if (!manifest[field]) errors.push(`Missing required field: "${field}"`);
        }

        if (manifest.manifest_version !== 3) {
          errors.push(`manifest_version must be 3, got ${manifest.manifest_version}`);
        }

        if (manifest.version && !/^\d+(\.\d+){0,3}$/.test(manifest.version)) {
          errors.push(`"version" must be dot-separated integers, got "${manifest.version}"`);
        }

        const iconSets = [
          manifest.icons,
          manifest.action?.default_icon,
        ].filter(Boolean);

        for (const iconSet of iconSets) {
          for (const [size, iconPath] of Object.entries(iconSet)) {
            if (!fs.existsSync(iconPath)) {
              errors.push(`Icon declared for size ${size} not found: "${iconPath}"`);
            }
          }
        }

        for (const cs of manifest.content_scripts ?? []) {
          for (const jsFile of cs.js ?? []) {
            if (!fs.existsSync(jsFile)) {
              errors.push(`Content script not found: "${jsFile}"`);
            }
          }
        }

        const sw = manifest.background?.service_worker;
        if (sw && !fs.existsSync(sw)) {
          errors.push(`Background service worker not found: "${sw}"`);
        }

        const popup = manifest.action?.default_popup;
        if (popup && !fs.existsSync(popup)) {
          errors.push(`Popup file not found: "${popup}"`);
        }

        if (errors.length > 0) {
          console.error("Manifest validation failed:\n" + errors.map(e => "  ✗ " + e).join("\n"));
          process.exit(1);
        }

        console.log("manifest.json is valid ✓");
        console.log(`  Name:    ${manifest.name}`);
        console.log(`  Version: ${manifest.version}`);
        console.log(`  MV:      ${manifest.manifest_version}`);
        EOF

    - name: Lint with web-ext
      shell: bash
      run: |
        web-ext lint \
          --source-dir . \
          --ignore-files "*.sql" "README*" ".github/**" "tests/**" "jest.config.js" "package*.json" "docs/**" \
          --self-hosted

    - name: Check JS syntax
      shell: bash
      run: |
        JS_FILES=$(find . \
          -name "*.js" \
          -not -path "./.github/*" \
          -not -path "./node_modules/*")

        FAILED=0
        for f in $JS_FILES; do
          node --check "$f" && echo "  ✓ $f" || { echo "  ✗ $f"; FAILED=1; }
        done

        if [ "$FAILED" -eq 1 ]; then
          echo "JS syntax errors found — see above"
          exit 1
        fi
        echo "All JS files pass syntax check ✓"

    - name: Check popup HTML
      shell: bash
      run: |
        node - << 'EOF'
        const fs  = require("fs");
        const src = fs.readFileSync("popup.html", "utf8");

        const errors = [];
        const scriptFiles = [...src.matchAll(/<script[^>]+src="([^"]+)"/g)].map(x => x[1]);
        for (const f of scriptFiles) {
          if (!fs.existsSync(f)) errors.push(`Script referenced in popup.html not found: "${f}"`);
        }

        if (errors.length > 0) {
          console.error(errors.join("\n"));
          process.exit(1);
        }

        console.log("popup.html references all valid ✓");
        EOF

    - name: Read version
      id: version
      shell: bash
      run: |
        VERSION=$(node -p "require('./manifest.json').version")
        NAME=$(node -p "require('./manifest.json').name.replace(/\s+/g,'-').toLowerCase()")
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "name=${NAME}"       >> "$GITHUB_OUTPUT"
        echo "Extension: ${NAME} v${VERSION}"

    - name: Pack extension
      id: pack
      shell: bash
      env:
        ZIP_SUFFIX: ${{ inputs.zip-suffix }}
      run: |
        BASE="${{ steps.version.outputs.name }}-v${{ steps.version.outputs.version }}"
        if [ -n "$ZIP_SUFFIX" ]; then
          ZIP_NAME="${BASE}-${ZIP_SUFFIX}.zip"
        else
          ZIP_NAME="${BASE}.zip"
        fi
        echo "Packing → ${ZIP_NAME}"

        zip -r "${ZIP_NAME}" . \
          --exclude "*.git*" \
          --exclude ".github/*" \
          --exclude "*.sql" \
          --exclude "README*" \
          --exclude "node_modules/*" \
          --exclude "tests/*" \
          --exclude "docs/*" \
          --exclude "jest.config.js" \
          --exclude "package*.json" \
          --exclude "*.zip"

        echo "zip-name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
        echo "Contents:"
        unzip -l "${ZIP_NAME}"
