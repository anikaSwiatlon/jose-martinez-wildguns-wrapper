name: Validate and package extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-pack:
    name: Validate and pack
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up Node (for web-ext) ────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Install web-ext ─────────────────────────────────────────────────
      # web-ext is Mozilla's CLI tool but its `lint` command fully validates
      # Manifest V3 extensions and catches: missing fields, bad permissions,
      # invalid JSON, missing icon files, and CSP issues.
      - name: Install web-ext
        run: npm install -g web-ext

      # ── Validate manifest.json structure ────────────────────────────────
      - name: Validate manifest.json
        run: |
          node - << 'EOF'
          const fs   = require("fs");
          const path = require("path");

          const raw = fs.readFileSync("manifest.json", "utf8");

          // Must be valid JSON
          let manifest;
          try {
            manifest = JSON.parse(raw);
          } catch (e) {
            console.error("manifest.json is not valid JSON:", e.message);
            process.exit(1);
          }

          const errors = [];

          // Required top-level fields
          const required = ["manifest_version", "name", "version"];
          for (const field of required) {
            if (!manifest[field]) errors.push(`Missing required field: "${field}"`);
          }

          // Must be Manifest V3
          if (manifest.manifest_version !== 3) {
            errors.push(`manifest_version must be 3, got ${manifest.manifest_version}`);
          }

          // Version must be dot-separated integers
          if (manifest.version && !/^\d+(\.\d+){0,3}$/.test(manifest.version)) {
            errors.push(`"version" must be dot-separated integers, got "${manifest.version}"`);
          }

          // Icons declared in manifest must exist on disk
          const iconSets = [
            manifest.icons,
            manifest.action?.default_icon,
          ].filter(Boolean);

          for (const iconSet of iconSets) {
            for (const [size, iconPath] of Object.entries(iconSet)) {
              if (!fs.existsSync(iconPath)) {
                errors.push(`Icon declared for size ${size} not found: "${iconPath}"`);
              }
            }
          }

          // Content script source files must exist
          for (const cs of manifest.content_scripts ?? []) {
            for (const jsFile of cs.js ?? []) {
              if (!fs.existsSync(jsFile)) {
                errors.push(`Content script not found: "${jsFile}"`);
              }
            }
          }

          // Background service worker must exist
          const sw = manifest.background?.service_worker;
          if (sw && !fs.existsSync(sw)) {
            errors.push(`Background service worker not found: "${sw}"`);
          }

          // Popup must exist
          const popup = manifest.action?.default_popup;
          if (popup && !fs.existsSync(popup)) {
            errors.push(`Popup file not found: "${popup}"`);
          }

          if (errors.length > 0) {
            console.error("Manifest validation failed:\n" + errors.map(e => "  ✗ " + e).join("\n"));
            process.exit(1);
          }

          console.log("manifest.json is valid ✓");
          console.log(`  Name:    ${manifest.name}`);
          console.log(`  Version: ${manifest.version}`);
          console.log(`  MV:      ${manifest.manifest_version}`);
          EOF

      # ── Lint with web-ext ────────────────────────────────────────────────
      - name: Lint with web-ext
        run: |
          web-ext lint \
            --source-dir . \
            --ignore-files "*.sql" "README*" ".github/**" \
            --ignore-errors BACKGROUND_SERVICE_WORKER_NOFALLBACK ADDON_ID_REQUIRED

      # ── Validate JS files parse without syntax errors ────────────────────
      - name: Check JS syntax
        run: |
          JS_FILES=$(find . \
            -name "*.js" \
            -not -path "./.github/*" \
            -not -path "./node_modules/*")

          FAILED=0
          for f in $JS_FILES; do
            node --check "$f" && echo "  ✓ $f" || { echo "  ✗ $f"; FAILED=1; }
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "JS syntax errors found — see above"
            exit 1
          fi
          echo "All JS files pass syntax check ✓"

      # ── Check popup HTML is well-formed ─────────────────────────────────
      - name: Check popup HTML
        run: |
          node - << 'EOF'
          const fs  = require("fs");
          const src = fs.readFileSync("popup.html", "utf8");

          const checks = [
            [/<script[^>]+src="([^"]+)"/, (m) => {
              const files = [...src.matchAll(/<script[^>]+src="([^"]+)"/g)].map(x => x[1]);
              return files.filter(f => !require("fs").existsSync(f))
                          .map(f => `Script referenced in popup.html not found: "${f}"`);
            }],
          ];

          const errors = [];
          const scriptFiles = [...src.matchAll(/<script[^>]+src="([^"]+)"/g)].map(x => x[1]);
          for (const f of scriptFiles) {
            if (!fs.existsSync(f)) errors.push(`Script referenced in popup.html not found: "${f}"`);
          }

          if (errors.length > 0) {
            console.error(errors.join("\n"));
            process.exit(1);
          }

          console.log("popup.html references all valid ✓");
          EOF

      # ── Determine version from manifest ─────────────────────────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          NAME=$(node -p "require('./manifest.json').name.replace(/\s+/g,'-').toLowerCase()")
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"         >> "$GITHUB_OUTPUT"
          echo "Extension: ${NAME} v${VERSION}"

      # ── Pack to zip (excluding dev/CI files) ────────────────────────────
      - name: Pack extension
        run: |
          ZIP_NAME="${{ steps.version.outputs.name }}-v${{ steps.version.outputs.version }}.zip"
          echo "Packing → ${ZIP_NAME}"

          zip -r "${ZIP_NAME}" . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.sql" \
            --exclude "README*" \
            --exclude "node_modules/*" \
            --exclude "*.zip"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Contents:"
          unzip -l "${ZIP_NAME}"

      # ── Upload as artifact ───────────────────────────────────────────────
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}-v${{ steps.version.outputs.version }}
          path: ${{ env.zip_name }}
          retention-days: 90
          if-no-files-found: error

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Wild Tracker — build summary

          | Field   | Value |
          |---------|-------|
          | Name    | ${{ steps.version.outputs.name }} |
          | Version | ${{ steps.version.outputs.version }} |
          | Commit  | \`${{ github.sha }}\` |
          | Branch  | \`${{ github.ref_name }}\` |
          | Artifact| \`${{ env.zip_name }}\` |

          Download the zip from the **Artifacts** section of this run and load it unpacked in Chrome.
          EOF
